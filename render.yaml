services:
  - type: web
    name: safelife-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
    disk:
      name: safelife-data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
